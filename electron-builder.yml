appId: com.kudu.app
productName: Kudu
copyright: Copyright © 2024-2026 Kudu Contributors

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

extraResources:
  - from: resources/icon.ico
    to: icon.ico
    filter:
      - "**/*"
  - from: resources/icon.png
    to: icon.png
    filter:
      - "**/*"
  - from: resources/icons
    to: icons
    filter:
      - "**/*"
  - from: resources/yara-rules
    to: yara-rules
    filter:
      - "**/*.yar"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  shortcutName: Kudu
  artifactName: Kudu-Setup-${version}.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: public.app-categories.utilities
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: true
  artifactName: Kudu-${version}-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icons/
  category: Utility
  artifactName: Kudu-${version}-${arch}.${ext}

deb:
  depends:
    - libgtk-3-0
    - libnss3
    - libxss1
    - libasound2 | libasound2t64
    - libgbm1
    - libfuse2 | libfuse2t64
  afterInstall: scripts/deb-postinstall.sh

publish:
  provider: github
  releaseType: release
